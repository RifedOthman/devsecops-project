name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: "Lint YAML & Dockerfile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s-deployment.yaml
          format: colored
          strict: false
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t flask-api:${{ github.sha }} .
      - name: Save image
        run: docker save flask-api:${{ github.sha }} -o /tmp/flask-api.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/flask-api.tar
          retention-days: 1

  trivy-fs-scan:
    name: "Trivy — Filesystem Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          vuln-type: library

  trivy-image-scan:
    name: "Trivy — Docker Image Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/flask-api.tar
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: flask-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          vuln-type: os,library

  conftest-policy:
    name: "Conftest — Kubernetes Policy"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
      - name: Run Conftest
        run: conftest test k8s-deployment.yaml --policy policy/ --all-namespaces || true

  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, trivy-fs-scan, trivy-image-scan, conftest-policy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## DevSecOps Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS | ${{ needs.trivy-fs-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image | ${{ needs.trivy-image-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Conftest | ${{ needs.conftest-policy.result }} |" >> $GITHUB_STEP_SUMMARY
